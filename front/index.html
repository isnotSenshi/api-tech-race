<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>api-tech-race 🏎️</title>
  <style>
    :root {
      --bg:#0b0e14; --panel:#141925; --panel2:#1b2230; --line:#272f3d;
      --txt:#e8eaed; --muted:#8b93a3; --accent:#4ade80; --accent2:#38bdf8;
    }
    * { box-sizing:border-box; }
    html { background:var(--bg); }
    body { margin:0; font-family:system-ui,-apple-system,Segoe UI,sans-serif; background:var(--bg); color:var(--txt); min-height:100vh; }

    /* Header compacto */
    header { padding:12px 24px; background:linear-gradient(135deg,#141925,#0b0e14); border-bottom:1px solid var(--line); }
    .head-row { display:flex; justify-content:space-between; align-items:flex-start; gap:16px; }
    header h1 { margin:0; font-size:20px; letter-spacing:-.5px; }
    header h1 .accent { background:linear-gradient(90deg,var(--accent),var(--accent2)); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
    header p { margin:3px 0 0; color:var(--muted); font-size:12px; }
    .lang { display:flex; gap:4px; flex:none; }
    .lang-btn { background:var(--panel2); border:1px solid var(--line); color:var(--muted); border-radius:6px; padding:5px 11px; font-size:12px; font-weight:700; cursor:pointer; }
    .lang-btn.active { background:linear-gradient(90deg,var(--accent),var(--accent2)); color:#04110a; border-color:transparent; }

    /* Layout: tarjetas con altura ajustada al contenido */
    main { max-width:1200px; width:100%; margin:0 auto; padding:14px 24px; display:flex; flex-direction:column; gap:14px; }
    .content { display:grid; grid-template-columns:1.3fr 1fr; gap:14px; align-items:start; }
    .card { background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:16px; }

    .controls { display:flex; flex-wrap:wrap; gap:14px; align-items:flex-end; }
    label { display:block; font-size:10px; text-transform:uppercase; letter-spacing:.5px; color:var(--muted); margin-bottom:5px; }
    input { background:var(--bg); color:var(--txt); border:1px solid var(--line); border-radius:8px; padding:9px 11px; font-size:14px; min-width:84px; }
    input[type=number] { -moz-appearance:textfield; appearance:textfield; }
    input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance:none; margin:0; }

    /* Dropdown custom */
    .cs { position:relative; min-width:160px; }
    .cs-btn { width:100%; display:flex; align-items:center; justify-content:space-between; gap:10px; background:var(--bg); color:var(--txt); border:1px solid var(--line); border-radius:8px; padding:9px 11px; font-size:14px; font-weight:500; cursor:pointer; }
    .cs-btn:hover { border-color:var(--accent2); }
    .cs-arrow { color:var(--muted); font-size:11px; transition:transform .2s; }
    .cs[data-open="true"] .cs-arrow { transform:rotate(180deg); }
    .cs-menu { display:none; position:absolute; top:calc(100% + 4px); left:0; min-width:100%; z-index:100; background:var(--panel2); border:1px solid var(--line); border-radius:8px; padding:5px; box-shadow:0 12px 32px rgba(0,0,0,.55); max-height:280px; overflow:auto; }
    .cs[data-open="true"] .cs-menu { display:block; }
    .cs-opt { padding:7px 9px; border-radius:6px; cursor:pointer; font-size:13px; white-space:nowrap; }
    .cs-opt:hover { background:var(--panel); }
    .cs-opt.active { background:linear-gradient(90deg,var(--accent),var(--accent2)); color:#04110a; font-weight:600; }
    .cs-opt.disabled { opacity:.35; cursor:not-allowed; }
    .cs-opt.ms { display:flex; align-items:center; gap:8px; }
    .cs-opt.ms::before { content:'✓'; width:12px; flex:none; color:transparent; font-size:12px; }
    .cs-opt.ms.on::before { color:var(--accent); }
    .cs-opt.ms.on { background:rgba(74,222,128,.12); }

    button.act { border:0; border-radius:8px; padding:10px 16px; font-size:14px; font-weight:700; cursor:pointer; transition:transform .08s, opacity .2s; }
    button.act:active { transform:scale(.97); }
    button.act:disabled { opacity:.5; cursor:not-allowed; }
    .btn-race { background:linear-gradient(90deg,var(--accent),var(--accent2)); color:#04110a; }
    .btn-one { background:var(--panel2); color:var(--txt); border:1px solid var(--line); }
    .spacer { flex:1; }
    #status { margin:8px 0 0; font-size:12px; color:var(--accent2); min-height:16px; }
    #status.err { color:#f87171; }
    .progress { height:7px; background:var(--bg); border:1px solid var(--line); border-radius:99px; overflow:hidden; margin:10px 0 0; }
    .progress-fill { height:100%; width:0; background:linear-gradient(90deg,var(--accent),var(--accent2)); transition:width .3s ease; }

    .info-btn { width:22px; height:22px; flex:none; border-radius:50%; border:1px solid var(--line); background:var(--panel2); color:var(--muted); font-style:italic; font-weight:700; font-size:13px; line-height:1; cursor:pointer; padding:0; }
    .info-btn:hover { color:var(--accent2); border-color:var(--accent2); }

    h2 { font-size:12px; margin:0 0 12px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; }

    .lb-row { display:grid; grid-template-columns:28px 160px 1fr 86px; align-items:center; gap:10px; padding:7px 0; border-bottom:1px solid var(--line); }
    .lb-row:last-child { border-bottom:0; }
    .rank { font-size:16px; text-align:center; }
    .who { display:flex; align-items:center; gap:9px; }
    .logo { width:26px; height:26px; object-fit:contain; border-radius:5px; background:#fff; padding:2px; flex:none; }
    .who .name { font-weight:600; font-size:13px; }
    .who small { display:block; color:var(--muted); font-weight:400; font-size:10px; }
    .bar-wrap { background:var(--bg); border-radius:6px; height:20px; overflow:hidden; }
    .bar { height:100%; border-radius:6px; transition:width .5s ease; }
    .rps { text-align:right; font-variant-numeric:tabular-nums; font-weight:700; font-size:13px; }
    .rps small { color:var(--muted); font-weight:400; }
    .dead { opacity:.4; }

    table { width:100%; border-collapse:collapse; font-size:12px; }
    th,td { text-align:right; padding:7px 8px; border-bottom:1px solid var(--line); font-variant-numeric:tabular-nums; }
    th:first-child, td:first-child { text-align:left; }
    th { color:var(--muted); font-weight:500; }

    /* Modales */
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.6); backdrop-filter:blur(2px); display:none; align-items:center; justify-content:center; z-index:1000; padding:20px; }
    .modal-overlay.open { display:flex; }
    .modal { background:var(--panel); border:1px solid var(--line); border-radius:14px; max-width:560px; width:100%; padding:24px; box-shadow:0 24px 70px rgba(0,0,0,.6); max-height:85vh; overflow:auto; }
    .modal-wide { max-width:700px; }
    .modal h3 { margin:0 0 8px; font-size:19px; }
    .modal p { font-size:13.5px; line-height:1.55; color:var(--txt); margin:10px 0; }
    .modal .flow { background:var(--bg); border:1px solid var(--line); border-radius:8px; padding:11px 13px; font-family:ui-monospace,SFMono-Regular,Menlo,monospace; font-size:12px; color:var(--accent2); overflow-x:auto; white-space:nowrap; margin:14px 0; }
    .modal .m-bn { background:var(--panel2); border-radius:8px; padding:10px 13px; margin-top:14px; }
    .modal .lbl { display:block; color:var(--muted); font-size:10px; text-transform:uppercase; letter-spacing:.5px; margin-bottom:3px; }
    .modal-close { float:right; cursor:pointer; color:var(--muted); font-size:24px; line-height:1; border:0; background:none; padding:0 0 0 12px; }
    .modal-close:hover { color:var(--txt); }

    .tile-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-top:14px; }
    .tile { display:flex; flex-direction:column; align-items:center; gap:8px; padding:14px 8px; background:var(--bg); border:1px solid var(--line); border-radius:10px; cursor:pointer; transition:border-color .15s, transform .08s; }
    .tile:hover { border-color:var(--accent2); transform:translateY(-2px); }
    .tile img { width:38px; height:38px; object-fit:contain; background:#fff; border-radius:6px; padding:3px; }
    .tile span { font-size:12px; text-align:center; color:var(--txt); }

    .back-btn { background:var(--panel2); color:var(--txt); border:1px solid var(--line); border-radius:8px; padding:7px 12px; font-size:13px; cursor:pointer; margin-bottom:14px; }
    .back-btn:hover { border-color:var(--accent2); }
    .sd-head { display:flex; align-items:center; gap:12px; margin-bottom:4px; }
    .sd-head img { width:44px; height:44px; object-fit:contain; background:#fff; border-radius:8px; padding:4px; flex:none; }
    .sd-head h3 { margin:0; font-size:19px; }
    .sd-tag { color:var(--muted); font-size:13px; margin:0 0 6px; }
    .specs { display:grid; grid-template-columns:1fr 1fr; gap:9px 18px; margin:16px 0; }
    .spec { font-size:12.5px; line-height:1.4; }
    .spec.wide { grid-column:1/-1; }
    .spec b { display:block; color:var(--muted); font-size:10px; text-transform:uppercase; letter-spacing:.4px; margin-bottom:2px; font-weight:600; }
    .pc { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-top:16px; }
    .pc h4 { margin:0 0 6px; font-size:11px; text-transform:uppercase; letter-spacing:.5px; }
    .pc .good h4 { color:var(--accent); }
    .pc .bad h4 { color:#f87171; }
    .pc ul { margin:0; padding-left:16px; }
    .pc li { font-size:12.5px; line-height:1.5; margin:4px 0; }
    .sd-use { background:var(--panel2); border-radius:8px; padding:11px 13px; margin-top:16px; font-size:13px; line-height:1.5; }

    @media (max-width:820px) { .content { grid-template-columns:1fr; } }
    @media (max-width:560px) { .tile-grid{grid-template-columns:repeat(3,1fr);} .specs,.pc{grid-template-columns:1fr;} }
  </style>
</head>
<body>
  <header>
    <div class="head-row">
      <div>
        <h1>api-tech-race <span class="accent">🏎️</span></h1>
        <p data-i18n="subtitle"></p>
      </div>
      <div class="lang">
        <button id="lang-es" class="lang-btn">ES</button>
        <button id="lang-en" class="lang-btn">EN</button>
      </div>
    </div>
  </header>

  <main>
    <div class="card" style="overflow:visible">
      <div class="controls">
        <div>
          <label data-i18n="op_label"></label>
          <div style="display:flex; align-items:center; gap:8px;">
            <div id="op"></div>
            <button id="op-info" class="info-btn">i</button>
          </div>
        </div>
        <div>
          <label data-i18n="requests_label"></label>
          <input id="requests" type="number" value="3000" min="1" max="2000000" />
        </div>
        <div>
          <label data-i18n="conc_label"></label>
          <input id="concurrency" type="number" value="50" min="1" max="2000" />
        </div>
        <div>
          <label data-i18n="rounds_label"></label>
          <input id="rounds" type="number" value="1" min="1" max="20" />
        </div>
        <button id="race" class="act btn-race" data-i18n="race_all"></button>
        <div class="spacer"></div>
        <div>
          <label data-i18n="stacks_label"></label>
          <div style="display:flex; align-items:center; gap:8px;">
            <button id="stack-info" class="info-btn">i</button>
            <div id="stack"></div>
          </div>
        </div>
        <button id="runone" class="act btn-one" data-i18n="run_selected"></button>
      </div>
      <div id="progress" class="progress" hidden><div id="progress-fill" class="progress-fill"></div></div>
      <p id="status"></p>
    </div>

    <div class="content">
      <div class="card">
        <h2 id="board-title"></h2>
        <div id="board"></div>
      </div>
      <div class="card">
        <h2 data-i18n="latency_title"></h2>
        <table>
          <thead><tr><th data-i18n="th_stack"></th><th>req/s</th><th>p50</th><th>p95</th><th>p99</th><th>ok%</th></tr></thead>
          <tbody id="latency"></tbody>
        </table>
      </div>
    </div>
  </main>

  <!-- Modal de operación -->
  <div class="modal-overlay" id="modal">
    <div class="modal">
      <button class="modal-close" id="modal-close">×</button>
      <h3 id="m-title"></h3>
      <p id="m-what"></p>
      <div class="flow" id="m-flow"></div>
      <p id="m-detail"></p>
      <p class="m-bn"><span class="lbl" data-i18n="bottleneck"></span><span id="m-bottleneck"></span></p>
    </div>
  </div>

  <!-- Modal de stacks -->
  <div class="modal-overlay" id="stack-modal">
    <div class="modal modal-wide">
      <button class="modal-close" id="stack-modal-close">×</button>
      <div id="stack-grid-view">
        <h3 data-i18n="stacks_modal_title"></h3>
        <div class="tile-grid" id="stack-grid"></div>
      </div>
      <div id="stack-detail-view" hidden>
        <button class="back-btn" id="stack-back" data-i18n="back"></button>
        <div id="stack-detail"></div>
      </div>
    </div>
  </div>

  <script>
    const API = 'http://localhost:4000'
    const $ = (id) => document.getElementById(id)
    const ms = (s) => s == null ? '—' : (s * 1000).toFixed(1)

    let LANG = localStorage.getItem('lang') || 'es'

    const COLORS = {
      go:'#00ADD8', rust:'#F25C2A', dotnet:'linear-gradient(90deg,#8b5cf6,#38bdf8)', java:'#6DB33F',
      fastify:'#FF8C00', nest:'#E0234E', express:'#EAC92C', python:'#05998b',
    }
    const MEDAL = ['🥇','🥈','🥉']
    const LOGO = {
      go:'ginGo.jpg', rust:'rust.png', dotnet:'ASPNET.png', java:'spring.jpg',
      python:'fastapiPython.png', fastify:'fastify.png', express:'express.png', nest:'nest.png',
    }

    // ── Textos de interfaz (i18n) ───────────────────────────────────────
    const STR = {
      es: {
        subtitle:'Carrera de 8 backend stacks — lectura, escritura y CPU bajo carga, contra la misma base Postgres.',
        op_label:'Operación', requests_label:'Peticiones', conc_label:'Concurrencia', rounds_label:'Rondas', rounds_word:'rondas', stacks_label:'Stacks (elegí los que quieras)',
        race_all:'🏁 Correr los 8', run_selected:'▶ Correr selección',
        latency_title:'Latencias (ms)', th_stack:'Stack',
        ranking_default:'Ranking — req/s', board_empty:'Tirá una carrera para ver resultados.',
        bottleneck:'Cuello de botella', stacks_modal_title:'Los 8 stacks — clickeá uno para ver su ficha', back:'← Volver',
        pick_stacks:'Elegí stacks…', selected:(n)=>`${n} elegido${n>1?'s':''}`,
        spec_lang:'Lenguaje', spec_typing:'Tipado', spec_compile:'Compilación', spec_pop:'Popularidad', spec_exec:'Cómo ejecuta (nivel máquina)', spec_eff:'Eficiencia',
        pros:'✓ A favor', cons:'✗ En contra', when_use:'Cuándo usarlo',
        running:(fw,i,n,r,rounds)=>`🏁 Corriendo ${fw} (${i}/${n})${rounds>1?` · ronda ${r}/${rounds}`:''}… — secuencial, para que sea justa`,
        race_done:'✅ Carrera completa.', no_stacks:'Elegí al menos un stack disponible', no_orch:'No se pudo conectar al orquestador en ',
      },
      en: {
        subtitle:'A race of 8 backend stacks — read, write and CPU under load, against the same Postgres database.',
        op_label:'Operation', requests_label:'Requests', conc_label:'Concurrency', rounds_label:'Rounds', rounds_word:'rounds', stacks_label:'Stacks (pick any)',
        race_all:'🏁 Race all 8', run_selected:'▶ Run selection',
        latency_title:'Latency (ms)', th_stack:'Stack',
        ranking_default:'Ranking — req/s', board_empty:'Run a race to see results.',
        bottleneck:'Bottleneck', stacks_modal_title:'The 8 stacks — click one for its profile', back:'← Back',
        pick_stacks:'Pick stacks…', selected:(n)=>`${n} selected`,
        spec_lang:'Language', spec_typing:'Typing', spec_compile:'Compilation', spec_pop:'Popularity', spec_exec:'How it runs (machine level)', spec_eff:'Efficiency',
        pros:'✓ Pros', cons:'✗ Cons', when_use:'When to use it',
        running:(fw,i,n,r,rounds)=>`🏁 Running ${fw} (${i}/${n})${rounds>1?` · round ${r}/${rounds}`:''}… — sequential, to keep it fair`,
        race_done:'✅ Race complete.', no_stacks:'Pick at least one available stack', no_orch:'Could not reach the orchestrator at ',
      },
    }

    const OP_LABELS = {
      es: { read:'Lectura 📖', 'read-heavy':'Lectura pesada 📖⚡', write:'Escritura 📝', aggregate:'Agregación 📑', compute:'Cómputo 🧠' },
      en: { read:'Read 📖', 'read-heavy':'Read-Heavy 📖⚡', write:'Write 📝', aggregate:'Aggregate 📑', compute:'Compute 🧠' },
    }

    const OP_INFO = {
      es: {
        read: { title:'Lectura 📖 — Lectura simple', what:'Trae 1 fila por su clave primaria (id). Es el "piso" del benchmark.', flow:'stack → SELECT … WHERE id=$1 → Postgres (index lookup) → 1 fila → JSON', detail:'Postgres encuentra la fila por el índice de la PK en microsegundos y el payload es minúsculo. Lo que se mide es el overhead por petición: parsear HTTP, pedir/devolver la conexión del pool y el ida y vuelta de red.', bottleneck:'Concurrencia / I/O del stack (la DB casi no trabaja). Premia el modelo de concurrencia, como las goroutines de Go.' },
        'read-heavy': { title:'Lectura pesada 📖⚡', what:'Trae muchas filas (1000) con un JOIN. Mide serializar payloads grandes.', flow:'stack → SELECT … JOIN categories LIMIT 1000 → Postgres → 1000 filas → JSON grande', detail:'El stack recibe 1000 filas, convierte cada campo del formato binario de Postgres a tipos del lenguaje y arma un JSON de decenas de KB. Ahí pesan el garbage collector (Go/Java/Node) y la eficiencia del serializador.', bottleneck:'Serialización a JSON (CPU del stack + GC). Rust se despega por serde y por no tener GC.' },
        write: { title:'Escritura 📝', what:'Inserta una fila nueva (INSERT). Mide la escritura y el pool bajo carga.', flow:'stack → INSERT … RETURNING id → Postgres (escribe + WAL en disco) → id → JSON', detail:'Postgres escribe primero en el WAL (Write-Ahead Log) para garantizar durabilidad ante un corte, y eso toca disco. Cada INSERT es una transacción con su commit, más caro que un read.', bottleneck:'Disco + transacciones de Postgres, y cómo el stack gestiona el pool en escrituras concurrentes.' },
        aggregate: { title:'Agregación 📑', what:'Cuenta y promedia agrupando por categoría sobre el millón de filas.', flow:'stack → SELECT count(*), avg(value) … GROUP BY → Postgres escanea ~1M filas → 10 filas → JSON', detail:'Es una consulta analítica (OLAP) pesada: Postgres recorre el millón de filas, las agrupa y calcula. El resultado es chico (10 filas), así que el stack casi no trabaja.', bottleneck:'La base de datos. Todos los stacks dan números parecidos porque esperan a la misma Postgres: mide más a Postgres que al framework.' },
        compute: { title:'Cómputo 🧠 — CPU pura', what:'Calcula Fibonacci recursivo. NO toca la base. Mide el runtime del lenguaje.', flow:'stack → fib(35) recursivo en CPU → (sin DB) → número → JSON', detail:'Sin red, sin pool, sin I/O: solo el lenguaje quemando CPU (~9 millones de llamadas recursivas). En runtimes de un solo hilo (Python/JS), un fib() grande bloquea todo bajo concurrencia.', bottleneck:'Velocidad bruta del runtime y su modelo de hilos. Compilados (Rust/Go) vuelan; interpretados (Python/JS) sufren.' },
      },
      en: {
        read: { title:'Read 📖 — Simple read', what:'Fetches 1 row by its primary key (id). The benchmark "floor".', flow:'stack → SELECT … WHERE id=$1 → Postgres (index lookup) → 1 row → JSON', detail:'Postgres finds the row by the PK index in microseconds and the payload is tiny. What gets measured is the per-request overhead: parsing HTTP, borrowing/returning the pool connection and the network round-trip.', bottleneck:'Stack concurrency / I/O (the DB barely works). Rewards the concurrency model, like Go goroutines.' },
        'read-heavy': { title:'Read-Heavy 📖⚡', what:'Fetches many rows (1000) with a JOIN. Measures serializing large payloads.', flow:'stack → SELECT … JOIN categories LIMIT 1000 → Postgres → 1000 rows → big JSON', detail:'The stack receives 1000 rows, converts each field from Postgres binary format to language types and builds a JSON of tens of KB. The garbage collector (Go/Java/Node) and serializer efficiency weigh here.', bottleneck:'JSON serialization (stack CPU + GC). Rust pulls ahead thanks to serde and having no GC.' },
        write: { title:'Write 📝', what:'Inserts a new row (INSERT). Measures writing and the pool under load.', flow:'stack → INSERT … RETURNING id → Postgres (writes + WAL to disk) → id → JSON', detail:'Postgres first writes to the WAL (Write-Ahead Log) to guarantee durability against a crash, which hits disk. Each INSERT is a transaction with its commit, costlier than a read.', bottleneck:'Disk + Postgres transactions, and how the stack manages the pool under concurrent writes.' },
        aggregate: { title:'Aggregate 📑', what:'Counts and averages grouped by category over the million rows.', flow:'stack → SELECT count(*), avg(value) … GROUP BY → Postgres scans ~1M rows → 10 rows → JSON', detail:'An analytical (OLAP) heavy query: Postgres scans the million rows, groups and computes. The result is small (10 rows), so the stack barely works.', bottleneck:'The database. All stacks score similarly because they wait on the same Postgres: it measures Postgres more than the framework.' },
        compute: { title:'Compute 🧠 — Pure CPU', what:'Computes recursive Fibonacci. Does NOT touch the DB. Measures the language runtime.', flow:'stack → recursive fib(35) on CPU → (no DB) → number → JSON', detail:'No network, no pool, no I/O: just the language burning CPU (~9 million recursive calls). On single-threaded runtimes (Python/JS) a big fib() blocks everything under concurrency.', bottleneck:'Raw runtime speed and threading model. Compiled (Rust/Go) fly; interpreted (Python/JS) struggle.' },
      },
    }

    const STACK_INFO = {
      es: {
        go: { tagline:'Concurrencia simple y veloz: el favorito para microservicios de alto tráfico.', lang:'Go, creado por Google (2009).', typing:'Estático, deliberadamente simple y minimalista.', compile:'Compilado AOT a binario nativo, sin dependencias externas.', exec:'Binario nativo con un runtime liviano propio. Sus goroutines (hilos verdes baratísimos) se multiplexan sobre los hilos del SO con un scheduler propio. GC de pausas muy cortas.', popularity:'Muy alta en cloud/infra (Docker y Kubernetes están hechos en Go).', efficiency:'Altísima, sobre todo en I/O concurrente. Arranque instantáneo y poca RAM.', pros:['Concurrencia baratísima (goroutines)','Compila a un solo binario → deploy trivial','Rápido de aprender, sintaxis mínima','Arranque inmediato, bajo consumo'], cons:['Manejo de errores verboso (if err != nil)','Menos expresivo (genéricos llegaron tarde)','El GC, aunque excelente, descarta latencia de microsegundos garantizada'], use:'General: APIs y microservicios de alto tráfico. Empresarial: estándar en cloud-native e infraestructura.' },

    let STACKS_LIST = [], OPERATIONS_RAW = [], lastResults = null, lastOp = null, lastReq = 0, lastConc = 0, lastRounds = 1

    // ── Dropdown custom (single) ────────────────────────────────────────
    function makeDropdown(el) {
      el.classList.add('cs')
      el.innerHTML = '<button type="button" class="cs-btn"><span class="cs-label"></span><span class="cs-arrow">▾</span></button><div class="cs-menu"></div>'
      const label = el.querySelector('.cs-label'), menu = el.querySelector('.cs-menu')
      const api = { value:null }
      api.select = (value, text) => { api.value = value; label.textContent = text; menu.querySelectorAll('.cs-opt').forEach(o => o.classList.toggle('active', o.dataset.value === value)) }
      api.set = (options) => {
        menu.innerHTML = options.map(o => `<div class="cs-opt" data-value="${o.value}">${o.label}</div>`).join('')
        menu.querySelectorAll('.cs-opt').forEach(o => o.addEventListener('click', () => { api.select(o.dataset.value, o.textContent); el.dataset.open='false' }))
      }
      el.querySelector('.cs-btn').addEventListener('click', (e) => { e.stopPropagation(); el.dataset.open = el.dataset.open === 'true' ? 'false' : 'true' })
      return api
    }

    // ── Multi-select (clic para elegir varios) ──────────────────────────
    function makeMultiSelect(el) {
      el.classList.add('cs')
      el.innerHTML = '<button type="button" class="cs-btn"><span class="cs-label"></span><span class="cs-arrow">▾</span></button><div class="cs-menu"></div>'
      const label = el.querySelector('.cs-label'), menu = el.querySelector('.cs-menu')
      const selected = new Set()
      const api = { get values() { return [...selected] } }
      const refresh = () => { label.textContent = selected.size ? STR[LANG].selected(selected.size) : STR[LANG].pick_stacks }
      api.refresh = refresh
      api.set = (options) => {
        selected.clear()
        menu.innerHTML = options.map(o => `<div class="cs-opt ms${o.disabled?' disabled':''}" data-value="${o.value}">${o.label}</div>`).join('')
        menu.querySelectorAll('.cs-opt:not(.disabled)').forEach(opt => opt.addEventListener('click', () => {
          const v = opt.dataset.value
          if (selected.has(v)) { selected.delete(v); opt.classList.remove('on') } else { selected.add(v); opt.classList.add('on') }
          refresh()
        }))
        refresh()
      }
      el.querySelector('.cs-btn').addEventListener('click', (e) => { e.stopPropagation(); el.dataset.open = el.dataset.open === 'true' ? 'false' : 'true' })
      menu.addEventListener('click', (e) => e.stopPropagation())
      return api
    }

    document.addEventListener('click', () => document.querySelectorAll('.cs').forEach(c => c.dataset.open = 'false'))
    const opDD = makeDropdown($('op'))
    const stackMS = makeMultiSelect($('stack'))

    // Re-arma el dropdown de operación con los labels del idioma actual.
    function buildOps() {
      const cur = opDD.value
      opDD.set(OPERATIONS_RAW.map(o => ({ value:o, label:OP_LABELS[LANG][o] || o })))
      const sel = cur || OPERATIONS_RAW[0]
      if (sel) opDD.select(sel, OP_LABELS[LANG][sel] || sel)
    }

    const rankingTitle = () => `Ranking — ${OP_LABELS[LANG][lastOp] || lastOp} (${lastReq} reqs, conc ${lastConc}${lastRounds>1?` · ${lastRounds} ${STR[LANG].rounds_word}`:''})`

    // Promedia una lista de objetos de métricas (para el modo "N rondas").
    function avgMetrics(list) {
      const keys = ['requestsPerSec','totalTimeSec','successRate','p50Sec','p90Sec','p95Sec','p99Sec','slowestSec','fastestSec','averageSec']
      const out = {}
      for (const k of keys) {
        const vals = list.map(m => m?.[k]).filter(v => typeof v === 'number')
        out[k] = vals.length ? vals.reduce((a,b)=>a+b,0)/vals.length : null
      }
      return out
    }

    // ── Aplicar idioma a toda la interfaz ───────────────────────────────
    function applyLang() {
      document.documentElement.lang = LANG
      document.querySelectorAll('[data-i18n]').forEach(el => { const v = STR[LANG][el.dataset.i18n]; if (v != null) el.textContent = v })
      $('lang-es').classList.toggle('active', LANG === 'es')
      $('lang-en').classList.toggle('active', LANG === 'en')
      buildOps()
      stackMS.refresh()
      if (lastResults) render(lastResults, rankingTitle())
      else { $('board-title').textContent = STR[LANG].ranking_default; $('board').innerHTML = `<p style="color:var(--muted)">${STR[LANG].board_empty}</p>` }
    }
    function setLang(l) { LANG = l; localStorage.setItem('lang', l); applyLang() }
    $('lang-es').addEventListener('click', () => setLang('es'))
    $('lang-en').addEventListener('click', () => setLang('en'))

    // ── Init: traer stacks + operaciones ────────────────────────────────
    async function init() {
      try {
        const data = await fetch(`${API}/stacks`).then(r => r.json())
        STACKS_LIST = data.stacks
        OPERATIONS_RAW = data.operations
        stackMS.set(data.stacks.map(s => ({ value:s.name, label:s.framework + (s.available?'':' (offline)'), disabled:!s.available })))
        applyLang()
      } catch {
        applyLang(); setStatus(STR[LANG].no_orch + API, true)
      }
    }

    function setStatus(msg, err=false) { $('status').textContent = msg; $('status').className = err?'err':'' }
    function lock(on) { $('race').disabled = on; $('runone').disabled = on }
    function showProgress(pct) { $('progress').hidden = false; $('progress-fill').style.width = pct + '%' }
    function hideProgress() { setTimeout(() => { $('progress').hidden = true; $('progress-fill').style.width = '0%' }, 700) }

    // ── Carrera (secuencial) ────────────────────────────────────────────
    async function runRace(stacks) {
      if (!stacks.length) { setStatus(STR[LANG].no_stacks, true); return }
      const rounds = Math.max(1, Math.min(20, +$('rounds').value || 1))
      lock(true); showProgress(0)
      lastOp = opDD.value; lastReq = +$('requests').value; lastConc = +$('concurrency').value; lastRounds = rounds
      const results = []
      const totalSteps = stacks.length * rounds
      let step = 0
      for (let i = 0; i < stacks.length; i++) {
        const s = stacks[i]
        const runs = []          // métricas de cada ronda de ESTE stack
        let failed = null
        for (let r = 0; r < rounds; r++) {
          setStatus(STR[LANG].running(s.framework, i + 1, stacks.length, r + 1, rounds))
          try {
            const data = await fetch(`${API}/run`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ stack:s.name, op:lastOp, requests:lastReq, concurrency:lastConc }) }).then(r => r.json())
            if (data.error) failed = data.error; else runs.push(data.metrics)
          } catch (e) { failed = 'no disponible' }
          step++; showProgress(step / totalSteps * 100)
        }
        // Promediamos las rondas exitosas; si todas fallaron, marcamos error.
        results.push(runs.length
          ? { stack:s.name, framework:s.framework, metrics:avgMetrics(runs), rounds:runs.length }
          : { stack:s.name, framework:s.framework, error:failed || 'error' })
        const sorted = [...results].sort((a, b) => (b.metrics?.requestsPerSec ?? -1) - (a.metrics?.requestsPerSec ?? -1))
        render(sorted, rankingTitle())
      }
      setStatus(STR[LANG].race_done); hideProgress(); lock(false)
    }
    const raceAll = () => runRace(STACKS_LIST.filter(s => s.available))
    const raceSelected = () => { const names = new Set(stackMS.values); runRace(STACKS_LIST.filter(s => names.has(s.name) && s.available)) }

    // ── Render ──────────────────────────────────────────────────────────
    function render(results, title) {
      lastResults = results
      $('board-title').textContent = title
      const max = Math.max(...results.map(r => r.metrics?.requestsPerSec || 0), 1)
      $('board').innerHTML = results.map((r, i) => {
        const logo = `<img class="logo" src="assets/${LOGO[r.stack]}" alt="" onerror="this.style.visibility='hidden'">`
        if (!r.metrics) return `<div class="lb-row dead"><div class="rank">💀</div><div class="who">${logo}<div><span class="name">${r.framework}</span><small>${r.stack}</small></div></div><div></div><div class="rps">${r.error||'error'}</div></div>`
        const rps = Math.round(r.metrics.requestsPerSec)
        const w = (r.metrics.requestsPerSec / max * 100).toFixed(1)
        const color = COLORS[r.stack] || '#888'
        return `<div class="lb-row"><div class="rank">${MEDAL[i] || (i+1)}</div><div class="who">${logo}<div><span class="name">${r.framework}</span><small>${r.stack}</small></div></div><div class="bar-wrap"><div class="bar" style="width:${w}%;background:${color}"></div></div><div class="rps">${rps.toLocaleString()}<small> r/s</small></div></div>`
      }).join('')
      $('latency').innerHTML = results.map(r => r.metrics
        ? `<tr><td>${r.framework}</td><td>${Math.round(r.metrics.requestsPerSec).toLocaleString()}</td><td>${ms(r.metrics.p50Sec)}</td><td>${ms(r.metrics.p95Sec)}</td><td>${ms(r.metrics.p99Sec)}</td><td>${Math.round(r.metrics.successRate*100)}</td></tr>`
        : `<tr class="dead"><td>${r.framework}</td><td colspan="5">${r.error||'error'}</td></tr>`
      ).join('')
    }

    // ── Modal de operación ──────────────────────────────────────────────
    function openModal() {
      const info = OP_INFO[LANG][opDD.value]; if (!info) return
      $('m-title').textContent = info.title; $('m-what').textContent = info.what
      $('m-flow').textContent = info.flow; $('m-detail').textContent = info.detail
      $('m-bottleneck').textContent = info.bottleneck
      $('modal').classList.add('open')
    }
    const closeModal = () => $('modal').classList.remove('open')
    $('op-info').addEventListener('click', openModal)
    $('modal-close').addEventListener('click', closeModal)
    $('modal').addEventListener('click', (e) => { if (e.target === $('modal')) closeModal() })

    // ── Modal de stacks ─────────────────────────────────────────────────
    function openStackModal() {
      $('stack-grid').innerHTML = STACKS_LIST.map(s => `<div class="tile" data-stack="${s.name}"><img src="assets/${LOGO[s.name]}" alt="" onerror="this.style.visibility='hidden'"><span>${s.framework}</span></div>`).join('')
      $('stack-grid').querySelectorAll('.tile').forEach(t => t.addEventListener('click', () => showStackDetail(t.dataset.stack)))
      $('stack-grid-view').hidden = false; $('stack-detail-view').hidden = true
      $('stack-modal').classList.add('open')
    }
    function showStackDetail(name) {
      const i = STACK_INFO[LANG][name]; if (!i) return
      const fw = (STACKS_LIST.find(s => s.name === name) || {}).framework || name
      const t = STR[LANG]
      $('stack-detail').innerHTML = `
        <div class="sd-head"><img src="assets/${LOGO[name]}" alt="" onerror="this.style.visibility='hidden'"><h3>${fw}</h3></div>
        <p class="sd-tag">${i.tagline}</p>
        <div class="specs">
          <div class="spec"><b>${t.spec_lang}</b>${i.lang}</div>
          <div class="spec"><b>${t.spec_typing}</b>${i.typing}</div>
          <div class="spec"><b>${t.spec_compile}</b>${i.compile}</div>
          <div class="spec"><b>${t.spec_pop}</b>${i.popularity}</div>
          <div class="spec wide"><b>${t.spec_exec}</b>${i.exec}</div>
          <div class="spec wide"><b>${t.spec_eff}</b>${i.efficiency}</div>
        </div>
        <div class="pc">
          <div class="good"><h4>${t.pros}</h4><ul>${i.pros.map(p => `<li>${p}</li>`).join('')}</ul></div>
          <div class="bad"><h4>${t.cons}</h4><ul>${i.cons.map(c => `<li>${c}</li>`).join('')}</ul></div>
        </div>
        <div class="sd-use"><b>${t.when_use}:</b> ${i.use}</div>`
      $('stack-grid-view').hidden = true; $('stack-detail-view').hidden = false
    }
    const closeStackModal = () => $('stack-modal').classList.remove('open')
    $('stack-info').addEventListener('click', openStackModal)
    $('stack-modal-close').addEventListener('click', closeStackModal)
    $('stack-modal').addEventListener('click', (e) => { if (e.target === $('stack-modal')) closeStackModal() })
    $('stack-back').addEventListener('click', () => { $('stack-detail-view').hidden = true; $('stack-grid-view').hidden = false })

    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') { closeModal(); closeStackModal() } })

    $('race').addEventListener('click', raceAll)
    $('runone').addEventListener('click', raceSelected)
    init()
  </script>
</body>
</html>
