# ============================================================================
# application.properties — configuración del stack Java + Spring Boot.
#
# Acá viven los ajustes de "fairness" (equidad de la carrera) y la conexión a
# Postgres. Las claves de fairness (pool=10, puerto=3000) DEBEN coincidir con
# los otros 7 stacks o el benchmark se sesga.
# ============================================================================

# ── Servidor HTTP ───────────────────────────────────────────────────────────
# Tomcat embebido escucha en :3000 dentro del contenedor (igual que todos).
server.port=3000
# server.address por defecto es 0.0.0.0 -> escucha en todas las interfaces,
# obligatorio dentro de Docker para que el contenedor sea accesible desde fuera.
server.address=0.0.0.0

# ── Conexión a PostgreSQL (vía DataSource estándar de Spring) ────────────────
# Spring soporta placeholders ${VAR:default}: toma la variable de entorno y, si
# falta, usa el default. Replicamos los mismos defaults del contrato.
# Construimos la URL JDBC a partir de las variables individuales (PGHOST, etc.),
# que es como las inyecta docker-compose. El host "postgres" es el nombre del
# servicio en la red interna de Compose.
spring.datasource.url=jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:race}
spring.datasource.username=${PGUSER:race}
spring.datasource.password=${PGPASSWORD:race}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── Pool de conexiones (HikariCP) ────────────────────────────────────────────
# CONSTANTE DE FAIRNESS: pool de exactamente 10 conexiones, igual en los 8 stacks.
# Bajo alta concurrencia los requests "hacen cola" esperando una conexión libre;
# que todos tengan el mismo tamaño de pool es lo que hace justa la comparación.
spring.datasource.hikari.maximum-pool-size=10

# ── Jackson (serialización JSON) ─────────────────────────────────────────────
# Por defecto Jackson escribiría las fechas como número epoch (timestamp). Con
# esto las escribe como string ISO-8601 (ej. "2025-11-18T09:25:08.901Z"),
# igual que el stack de referencia (Fastify/pg).
spring.jackson.serialization.write-dates-as-timestamps=false

# ── Logging al mínimo ────────────────────────────────────────────────────────
# NO logueamos por request: loguear cada petición agrega latencia y sesga la
# medición. Subimos el nivel global a WARN para silenciar el ruido de info/debug.
logging.level.root=WARN
# Apagamos el banner de arranque de Spring Boot (cosmético, no aporta nada acá).
spring.main.banner-mode=off
